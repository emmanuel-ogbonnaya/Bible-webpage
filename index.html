<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIBLE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>SEARCH THE SCRIPTURE</h1>
    <input type="text" id="verse" placeholder="e.g John 3:16">
    <button id="getverse-btn" onclick="getVerse()">Get Verse</button>

    <select id="translation-select" class="translation-select">
        <option value="web">Modern English (web)</option>
        <option value="kjv">King James Version</option>
        <option value="nkjv">New King James Version</option>
    </select>
    
    <h2 id="reference"></h2>
    <p id="text"></p>
    <p id="translation"></p>

<script src="script.js"></script>
</body>
</html>
